<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Территория влияния — Часы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { min-height: 100%; margin: 0; }
    body {
      background: #030712;
      color: white;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    input::placeholder { color: rgba(255,255,255,.3); }

    :root {
      --ring-size: clamp(10rem, 20vw, 14rem);
      --timer-value-size: clamp(2rem, 4.2vw, 4.2rem);
      --hero-title-size: clamp(2.2rem, 4.8vw, 4.8rem);
      --hero-subtitle-size: clamp(0.82rem, 1.4vw, 1.05rem);
      --content-max: 1560px;
    }

    @media (max-width: 1024px) {
      :root {
        --ring-size: clamp(10.5rem, 34vw, 14rem);
      }
    }

    @media (max-height: 860px) {
      :root {
        --ring-size: clamp(9rem, 18vw, 12.5rem);
        --timer-value-size: clamp(1.8rem, 3.8vw, 3.7rem);
        --hero-title-size: clamp(1.9rem, 4.2vw, 4rem);
        --hero-subtitle-size: clamp(0.78rem, 1.25vw, 0.96rem);
      }
    }

    @media (max-height: 760px) {
      :root {
        --ring-size: clamp(8.2rem, 16vw, 11rem);
        --timer-value-size: clamp(1.6rem, 3.4vw, 3.2rem);
      }
    }
  
    @media (max-height: 860px) {
      .hero-tight { margin-top: 0.5rem !important; }
      .controls-tight { margin-bottom: 0.75rem !important; }
    }

  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useCallback, useEffect, useMemo, useRef, useState } = React;
    const { motion } = Motion;

    const iconStroke = {
      fill: "none",
      stroke: "currentColor",
      strokeWidth: 2,
      strokeLinecap: "round",
      strokeLinejoin: "round"
    };

    const PlayIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M8 5v14l11-7z" />
      </svg>
    );

    const PauseIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" {...iconStroke} aria-hidden="true">
        <rect x="6" y="4" width="4" height="16" rx="1" />
        <rect x="14" y="4" width="4" height="16" rx="1" />
      </svg>
    );

    const RotateCcwIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" {...iconStroke} aria-hidden="true">
        <path d="M3 2v6h6" />
        <path d="M3 8a9 9 0 1 0 2.64-6.36L3 4" />
      </svg>
    );

    const ShuffleIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" {...iconStroke} aria-hidden="true">
        <path d="M16 3h5v5" />
        <path d="M4 20 21 3" />
        <path d="M21 16v5h-5" />
        <path d="M15 15 21 21" />
        <path d="M4 4 9 9" />
      </svg>
    );

    const Volume2Icon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" {...iconStroke} aria-hidden="true">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M15.5 8.5a5 5 0 0 1 0 7" />
        <path d="M19 5a10 10 0 0 1 0 14" />
      </svg>
    );

    const MessageSquareIcon = ({ size = 18 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" {...iconStroke} aria-hidden="true">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
    );

    function formatTime(totalSeconds) {
      const safe = Math.max(0, Math.floor(totalSeconds));
      const minutes = Math.floor(safe / 60);
      const seconds = safe % 60;
      return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
    }

    function useSoundEngine() {
      const audioCtxRef = useRef(null);

      const ensureContext = () => {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;
        if (!audioCtxRef.current) audioCtxRef.current = new AudioCtor();
        if (audioCtxRef.current.state === "suspended") audioCtxRef.current.resume();
        return audioCtxRef.current;
      };

      const playPartial = (ctx, frequency, start, duration, peakVolume, type, filterFreq, detune = 0) => {
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, start);
        oscillator.detune.setValueAtTime(detune, start);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(filterFreq, start);
        filter.Q.setValueAtTime(0.8, start);

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(peakVolume, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(Math.max(peakVolume * 0.28, 0.0001), start + duration * 0.38);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

        oscillator.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        oscillator.start(start);
        oscillator.stop(start + duration + 0.05);
      };

      const playSynth = (frequency = 880, duration = 0.12, volume = 0.03, type = "beep") => {
        const ctx = ensureContext();
        if (!ctx) return;

        if (type === "build") {
          const now = ctx.currentTime;
          playPartial(ctx, 220, now, 0.42, 0.04, "sine", 1800);
          playPartial(ctx, 300, now + 0.16, 0.38, 0.055, "triangle", 2100);
          playPartial(ctx, 420, now + 0.32, 0.34, 0.075, "triangle", 2400);
          playPartial(ctx, 560, now + 0.5, 0.3, 0.095, "sine", 2600);
          playPartial(ctx, 760, now + 0.66, 0.26, 0.115, "triangle", 2800);
          return;
        }

        if (type === "gong") {
          const now = ctx.currentTime;
          playPartial(ctx, 146, now, 3.8, 0.4, "triangle", 1200);
          playPartial(ctx, 218, now + 0.015, 3.5, 0.21, "sine", 1800, 2);
          playPartial(ctx, 292, now + 0.025, 3.0, 0.13, "sine", 2200, -3);
          playPartial(ctx, 438, now + 0.04, 2.6, 0.08, "triangle", 2600);
          playPartial(ctx, 584, now + 0.055, 2.2, 0.05, "sine", 3000);
          return;
        }

        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(volume, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + duration + 0.02);
      };

      return { playSynth };
    }

    function StarField() {
      const stars = useMemo(
        () => Array.from({ length: 90 }, (_, i) => ({
          id: i,
          left: `${(i * 97) % 100}%`,
          top: `${(i * 53) % 100}%`,
          size: 1 + ((i * 7) % 3),
          delay: (i % 7) * 0.4,
          duration: 2.4 + (i % 6),
        })),
        []
      );

      return (
        <div className="pointer-events-none absolute inset-0 overflow-hidden">
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(72,120,255,0.25),transparent_30%),radial-gradient(circle_at_80%_18%,rgba(79,120,255,0.22),transparent_22%),radial-gradient(circle_at_50%_70%,rgba(255,142,72,0.12),transparent_20%),linear-gradient(180deg,#020817_0%,#07132d_42%,#091a3b_70%,#030712_100%)]" />
          <div className="absolute right-[-8%] top-[-10%] h-[42vw] w-[42vw] rounded-full bg-[radial-gradient(circle,rgba(122,180,255,0.30),rgba(67,104,220,0.18)_38%,rgba(0,0,0,0)_68%)] blur-sm" />
          <div className="absolute left-[8%] top-[10%] h-40 w-40 rounded-full bg-violet-400/15 blur-3xl" />
          <div className="absolute left-1/2 top-[62%] h-28 w-[34rem] -translate-x-1/2 rounded-full bg-orange-400/20 blur-3xl" />
          <div className="absolute bottom-[-12%] left-1/2 h-[22rem] w-[68rem] -translate-x-1/2 rounded-full border border-cyan-400/20 bg-[radial-gradient(circle,rgba(54,104,255,0.08),transparent_68%)] shadow-[0_0_120px_rgba(41,114,255,0.22)]" />
          {stars.map((star) => (
            <motion.span
              key={star.id}
              className="absolute rounded-full bg-white/90"
              style={{ left: star.left, top: star.top, width: star.size, height: star.size }}
              animate={{ opacity: [0.15, 1, 0.25], scale: [1, 1.35, 1] }}
              transition={{ repeat: Infinity, duration: star.duration, delay: star.delay }}
            />
          ))}
        </div>
      );
    }

    function TerraLogo() {
      return (
        <div className="flex items-center gap-4 text-white">
          <div className="flex h-12 w-12 md:h-14 md:w-14 items-center justify-center rounded-full border border-white/70 text-xs tracking-[0.4em]">
            <div className="h-8 w-8 md:h-9 md:w-9 rounded-full border border-white/60" />
          </div>
          <div className="text-[1.9rem] md:text-3xl font-light tracking-[0.35em]">TERRA</div>
        </div>
      );
    }

    function TimeRing({ value, total, active }) {
      const safeTotal = Math.max(1, total);
      const overtime = value > safeTotal;
      const progressBase = overtime ? 1 : Math.max(0, Math.min(1, value / safeTotal));
      const clockwiseDegrees = 360 - progressBase * 360;
      const urgent = !overtime && value <= 10;
      const critical = !overtime && value <= 3;

      return (
        <div className="relative mx-auto" style={{ width: "var(--ring-size)", height: "var(--ring-size)" }}>
          <div className="absolute inset-0 rounded-full border border-white/10 bg-black/20 backdrop-blur-xl" />
          <div
            className="absolute inset-0 rounded-full"
            style={{
              background: overtime
                ? "conic-gradient(#ff9f43 360deg, rgba(255,255,255,0.08) 360deg 360deg)"
                : `conic-gradient(${critical ? "#ff6b57, #ffb36a" : urgent ? "#ff8f5a, #7dc2ff" : "#7dc2ff, #4b69ff"} ${clockwiseDegrees}deg, rgba(255,255,255,0.08) ${clockwiseDegrees}deg 360deg)`,
              boxShadow: active
                ? "0 0 80px rgba(90,144,255,0.45), 0 0 120px rgba(90,144,255,0.25), inset 0 0 40px rgba(255,255,255,0.1)"
                : "inset 0 0 30px rgba(255,255,255,0.04)",
            }}
          />
          <div className="absolute inset-[12px] rounded-full border border-white/10 bg-[radial-gradient(circle_at_50%_35%,rgba(255,255,255,0.16),rgba(6,12,28,0.92)_65%)]" />
          <div className="absolute inset-0 flex flex-col items-center justify-center text-white">
            <div className="text-[11px] md:text-xs uppercase tracking-[0.45em] text-blue-100/70">время</div>
            <div
              className={`mt-2 font-semibold tracking-tight ${overtime ? "text-orange-300" : critical ? "text-orange-200" : active ? "text-cyan-200" : "text-white"}`}
              style={{ fontSize: "var(--timer-value-size)" }}
            >
              {formatTime(value)}
            </div>
          </div>
          {active && (
            <div className="absolute inset-[-10px] animate-pulse rounded-full border border-cyan-300/40 shadow-[0_0_120px_rgba(90,144,255,0.5)]" />
          )}
        </div>
      );
    }

    function DuelSide({ title, player, active, timeLeft, totalTime, onToggle }) {
      const urgent = timeLeft <= 10;
      const critical = timeLeft <= 3;

      return (
        <motion.div
          animate={{ scale: active ? 1.02 : 1, y: active ? -4 : 0 }}
          transition={{ duration: 0.25 }}
          className={[
            "relative overflow-hidden rounded-[2rem] border p-4 sm:p-4 lg:p-5 xl:p-6",
            active
              ? "border-cyan-300/50 bg-white/15 shadow-[0_0_120px_rgba(56,110,255,0.35)]"
              : "border-white/10 bg-white/5 opacity-80",
          ].join(" ")}
        >
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(112,163,255,0.16),transparent_34%),linear-gradient(180deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02))]" />
          {critical && <div className="absolute inset-0 animate-pulse bg-[radial-gradient(circle_at_center,rgba(255,115,64,0.20),transparent_55%)]" />}

          <div className="relative z-10">
            <div className="text-xs sm:text-sm uppercase tracking-[0.35em] text-blue-100/65">{title}</div>
            <div className="mt-2 text-2xl sm:text-[2rem] xl:text-4xl font-semibold text-white break-words">{player || "Игрок"}</div>
            <div className="mt-2 text-xs sm:text-sm uppercase tracking-[0.3em] text-blue-200/70">{active ? "в эфире" : "ожидает ход"}</div>

            <div className="mt-4 sm:mt-5 xl:mt-6">
              <TimeRing value={timeLeft} total={totalTime} active={active} />
            </div>

            <div className="mt-4 sm:mt-5 xl:mt-6 flex justify-center">
              <button
                onClick={onToggle}
                className={[
                  "inline-flex min-w-[10rem] sm:min-w-[12rem] items-center justify-center gap-2 rounded-2xl px-5 py-3.5 text-base sm:text-lg font-medium text-white transition",
                  active
                    ? "bg-white/12 ring-1 ring-white/15 hover:bg-white/16"
                    : "bg-[linear-gradient(135deg,rgba(61,101,255,0.55),rgba(92,191,255,0.35))] shadow-[0_14px_40px_rgba(43,97,255,0.18)] hover:scale-[1.02]",
                ].join(" ")}
              >
                {active ? <PauseIcon size={18} /> : <PlayIcon size={18} />}
                {active ? "Пауза" : "Старт"}
              </button>
            </div>

            <div className="mt-3 sm:mt-4 text-center text-[10px] sm:text-xs uppercase tracking-[0.28em] text-blue-100/50">
              {urgent ? (critical ? "критический момент" : "последние секунды") : "экспресс‑формат · 1 минута"}
            </div>
          </div>
        </motion.div>
      );
    }

    function RandomOverlay(props) {
      const { open, temp1, temp2, current1, current2, onTemp1, onTemp2, onShuffle, isRandomizing, onStartGame } = props;
      if (!open) return null;

      const buttonClass = "inline-flex items-center gap-2 rounded-2xl bg-[linear-gradient(135deg,#355cff,#74d4ff)] px-6 py-4 text-lg font-medium text-white shadow-[0_16px_44px_rgba(51,92,255,0.28)] transition hover:scale-[1.02] disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:scale-100";

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4 backdrop-blur-md">
          <div className="relative w-full max-w-3xl overflow-hidden rounded-[2rem] border border-white/15 bg-[linear-gradient(180deg,rgba(10,18,40,0.95),rgba(4,10,24,0.98))] p-6 sm:p-8 text-white shadow-[0_0_80px_rgba(60,92,255,0.24)]">
            <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,rgba(89,139,255,0.20),transparent_35%),radial-gradient(circle_at_50%_100%,rgba(255,141,73,0.12),transparent_35%)]" />
            <div className="relative z-10">
              <div>
                <div className="text-xs uppercase tracking-[0.45em] text-blue-100/60">жеребьёвка</div>
                <div className="mt-2 text-2xl sm:text-3xl font-semibold">Кто начнёт раунд</div>
              </div>

              {!isRandomizing && (
                <div className="mt-8 grid gap-4 md:grid-cols-2">
                  <input value={temp1} onChange={(e) => onTemp1(e.target.value)} placeholder="Имя 1" className="rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-lg outline-none placeholder:text-white/30 focus:border-cyan-300/40" />
                  <input value={temp2} onChange={(e) => onTemp2(e.target.value)} placeholder="Имя 2" className="rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-lg outline-none placeholder:text-white/30 focus:border-cyan-300/40" />
                </div>
              )}

              <div className="mt-8 grid gap-4 md:grid-cols-2">
                <div className="rounded-[1.5rem] border border-cyan-300/20 bg-white/5 p-6">
                  <div className="text-xs uppercase tracking-[0.35em] text-blue-100/55">Игрок 1</div>
                  <div className="mt-3 text-3xl font-semibold">{current1 || "Игрок 1"}</div>
                </div>
                <div className="rounded-[1.5rem] border border-orange-300/20 bg-white/5 p-6">
                  <div className="text-xs uppercase tracking-[0.35em] text-blue-100/55">Игрок 2</div>
                  <div className="mt-3 text-3xl font-semibold">{current2 || "Игрок 2"}</div>
                </div>
              </div>

              <div className="mt-8 flex flex-wrap justify-center gap-4">
                <button onClick={onShuffle} className={buttonClass}>
                  <ShuffleIcon size={18} />
                  {isRandomizing ? "Определяем..." : "Перемешать"}
                </button>

                <button onClick={onStartGame} disabled={isRandomizing} className={buttonClass}>
                  <PlayIcon size={18} />
                  Начать игру
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function JudgesOverlay(props) {
      const {
        open, judgeElapsed, judgeLimit, judgeRunning, judgeMinutesInput,
        onClose, onStartPause, onSetPreset, onJudgeMinutesInputChange,
        onApplyCustom, onNextJudge
      } = props;

      if (!open) return null;

      const buttonClass = "inline-flex items-center gap-2 rounded-2xl bg-[linear-gradient(135deg,#355cff,#74d4ff)] px-6 py-4 text-lg font-medium text-white shadow-[0_16px_44px_rgba(51,92,255,0.28)] transition hover:scale-[1.02]";
      const overtime = judgeElapsed > judgeLimit;
      const overtimeSeconds = overtime ? judgeElapsed - judgeLimit : 0;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4 backdrop-blur-md">
          <div className="relative w-full max-w-3xl overflow-hidden rounded-[2rem] border border-white/15 bg-[linear-gradient(180deg,rgba(10,18,40,0.95),rgba(4,10,24,0.98))] p-6 sm:p-8 text-white shadow-[0_0_80px_rgba(60,92,255,0.24)]">
            <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,rgba(89,139,255,0.20),transparent_35%),radial-gradient(circle_at_50%_100%,rgba(255,141,73,0.12),transparent_35%)]" />
            <div className="relative z-10">
              <div>
                <div className="text-xs uppercase tracking-[0.45em] text-blue-100/60">судейская оценка</div>
                <div className="mt-2 text-2xl sm:text-3xl font-semibold">Время для комментария судьи</div>
                <div className="mt-3 text-sm uppercase tracking-[0.28em] text-blue-100/55">
                  {overtime ? `перелимит: +${formatTime(overtimeSeconds)}` : "рекомендуемый лимит комментария"}
                </div>
              </div>

              <div className="mt-8 flex justify-center">
                <TimeRing value={judgeElapsed} total={Math.max(judgeLimit, 60)} active={judgeRunning} />
              </div>

              <div className={`mt-6 text-center text-4xl sm:text-5xl font-semibold tracking-[0.08em] ${overtime ? "text-orange-300" : "text-white"}`}>
                {formatTime(judgeElapsed)}
              </div>

              <div className="mt-8 flex flex-wrap justify-center gap-3">
                {[60, 120, 300, 600].map((seconds) => (
                  <button key={seconds} onClick={() => onSetPreset(seconds)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white/90 transition hover:bg-white/10">
                    {seconds === 60 ? "1 мин" : seconds === 120 ? "2 мин" : seconds === 300 ? "5 мин" : "10 мин"}
                  </button>
                ))}
              </div>

              <div className="mt-6 flex flex-wrap items-end justify-center gap-3">
                <div>
                  <div className="mb-2 text-xs uppercase tracking-[0.2em] text-blue-100/55">своё время</div>
                  <input value={judgeMinutesInput} onChange={(e) => onJudgeMinutesInputChange(e.target.value)} placeholder="минуты" className="w-28 rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-lg text-white outline-none placeholder:text-white/30 focus:border-cyan-300/40" />
                </div>
                <button onClick={onApplyCustom} className="rounded-2xl border border-white/10 bg-white/5 px-5 py-3 text-white/90 transition hover:bg-white/10">
                  Применить
                </button>
              </div>

              <div className="mt-8 flex flex-wrap justify-center gap-4">
                <button onClick={onStartPause} className={buttonClass}>
                  {judgeRunning ? <PauseIcon size={18} /> : <PlayIcon size={18} />}
                  {judgeRunning ? "Пауза" : "Старт"}
                </button>
                <button onClick={onNextJudge} className={buttonClass}>
                  <RotateCcwIcon size={18} />
                  Следующий судья
                </button>
                <button onClick={onClose} className={buttonClass}>
                  Вернуться в игру
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const TOTAL_SECONDS = 60;
      const { playSynth } = useSoundEngine();

      const [player1Name, setPlayer1Name] = useState("Игрок 1");
      const [player2Name, setPlayer2Name] = useState("Игрок 2");
      const [temp1, setTemp1] = useState("Имя 1");
      const [temp2, setTemp2] = useState("Имя 2");
      const [player1, setPlayer1] = useState(TOTAL_SECONDS);
      const [player2, setPlayer2] = useState(TOTAL_SECONDS);
      const [activePlayer, setActivePlayer] = useState(1);
      const [running, setRunning] = useState(false);
      const [soundEnabled, setSoundEnabled] = useState(true);
      const [showRandomizer, setShowRandomizer] = useState(false);
      const [isRandomizing, setIsRandomizing] = useState(false);
      const [showEndEffect, setShowEndEffect] = useState(false);
      const [showFlashEffect, setShowFlashEffect] = useState(false);
      const [showJudgesOverlay, setShowJudgesOverlay] = useState(false);
      const [judgeElapsed, setJudgeElapsed] = useState(0);
      const [judgeLimit, setJudgeLimit] = useState(60);
      const [judgeRunning, setJudgeRunning] = useState(false);
      const [judgeMinutesInput, setJudgeMinutesInput] = useState("1");

      const flickerIntervalRef = useRef(null);
      const flickerTimeoutRef = useRef(null);
      const endEffectTimeoutRef = useRef(null);
      const flashTimeoutRef = useRef(null);
      const gongTimeoutRef = useRef(null);
      const echoTimeoutRef = useRef(null);
      const judgeTimerRef = useRef(null);
      const prevP1Ref = useRef(player1);
      const prevP2Ref = useRef(player2);
      const prevJudgeElapsedRef = useRef(0);

      const playCinematicGong = useCallback(() => {
        playSynth(0, 0, 0, "gong");
        if (echoTimeoutRef.current) clearTimeout(echoTimeoutRef.current);
        echoTimeoutRef.current = setTimeout(() => {
          playSynth(0, 0, 0, "gong");
          echoTimeoutRef.current = null;
        }, 360);
      }, [playSynth]);

      const triggerEndEffect = useCallback(() => {
        if (soundEnabled) playSynth(0, 0, 0, "build");

        if (flashTimeoutRef.current) clearTimeout(flashTimeoutRef.current);
        if (gongTimeoutRef.current) clearTimeout(gongTimeoutRef.current);
        if (endEffectTimeoutRef.current) clearTimeout(endEffectTimeoutRef.current);
        if (echoTimeoutRef.current) clearTimeout(echoTimeoutRef.current);

        flashTimeoutRef.current = setTimeout(() => {
          setShowFlashEffect(true);
          flashTimeoutRef.current = setTimeout(() => {
            setShowFlashEffect(false);
            flashTimeoutRef.current = null;
          }, 300);
        }, 720);

        gongTimeoutRef.current = setTimeout(() => {
          setShowEndEffect(true);
          if (soundEnabled) playCinematicGong();

          endEffectTimeoutRef.current = setTimeout(() => {
            setShowEndEffect(false);
            endEffectTimeoutRef.current = null;
          }, 2600);

          gongTimeoutRef.current = null;
        }, 830);
      }, [playCinematicGong, playSynth, soundEnabled]);

      useEffect(() => {
        if (!judgeRunning) return;
        judgeTimerRef.current = setInterval(() => setJudgeElapsed((prev) => prev + 1), 1000);
        return () => {
          if (judgeTimerRef.current) {
            clearInterval(judgeTimerRef.current);
            judgeTimerRef.current = null;
          }
        };
      }, [judgeRunning]);

      useEffect(() => () => {
        if (flickerIntervalRef.current) clearInterval(flickerIntervalRef.current);
        if (flickerTimeoutRef.current) clearTimeout(flickerTimeoutRef.current);
        if (endEffectTimeoutRef.current) clearTimeout(endEffectTimeoutRef.current);
        if (flashTimeoutRef.current) clearTimeout(flashTimeoutRef.current);
        if (gongTimeoutRef.current) clearTimeout(gongTimeoutRef.current);
        if (echoTimeoutRef.current) clearTimeout(echoTimeoutRef.current);
        if (judgeTimerRef.current) clearInterval(judgeTimerRef.current);
      }, []);

      useEffect(() => {
        if (!running) return;
        const timerId = setInterval(() => {
          if (activePlayer === 1) {
            setPlayer1((prev) => {
              if (prev <= 1) {
                setRunning(false);
                triggerEndEffect();
                return 0;
              }
              return prev - 1;
            });
          } else {
            setPlayer2((prev) => {
              if (prev <= 1) {
                setRunning(false);
                triggerEndEffect();
                return 0;
              }
              return prev - 1;
            });
          }
        }, 1000);

        return () => clearInterval(timerId);
      }, [running, activePlayer, triggerEndEffect]);

      useEffect(() => {
        const prev = prevP1Ref.current;
        if (soundEnabled && running && activePlayer === 1 && player1 !== prev && player1 > 0 && player1 <= 3) {
          playSynth(player1 === 1 ? 980 : 880);
        }
        prevP1Ref.current = player1;
      }, [player1, running, activePlayer, soundEnabled, playSynth]);

      useEffect(() => {
        const prev = prevP2Ref.current;
        if (soundEnabled && running && activePlayer === 2 && player2 !== prev && player2 > 0 && player2 <= 3) {
          playSynth(player2 === 1 ? 980 : 880);
        }
        prevP2Ref.current = player2;
      }, [player2, running, activePlayer, soundEnabled, playSynth]);

      useEffect(() => {
        const prev = prevJudgeElapsedRef.current;
        if (soundEnabled && judgeRunning && judgeElapsed !== prev && judgeElapsed > judgeLimit) {
          const overtimeSeconds = judgeElapsed - judgeLimit;
          const frequency = Math.min(520, 240 + overtimeSeconds * 18);
          const volume = Math.min(0.06, 0.012 + overtimeSeconds * 0.0035);
          playSynth(frequency, 0.18, volume, "beep");
        }
        prevJudgeElapsedRef.current = judgeElapsed;
      }, [judgeElapsed, judgeLimit, judgeRunning, soundEnabled, playSynth]);

      const reset = () => {
        setRunning(false);
        setPlayer1(TOTAL_SECONDS);
        setPlayer2(TOTAL_SECONDS);
        setActivePlayer(1);
        setShowEndEffect(false);
        setShowFlashEffect(false);
        setJudgeRunning(false);
        setJudgeElapsed(0);
      };

      const togglePlayer = (player) => {
        if (player === activePlayer && running) {
          setRunning(false);
          return;
        }
        if (player === 1 && player1 === 0) return;
        if (player === 2 && player2 === 0) return;
        setActivePlayer(player);
        setRunning(true);
      };

      const openRandomizer = () => {
        setShowRandomizer(true);
        setIsRandomizing(false);
      };

      const startGame = () => setShowRandomizer(false);

      const startShuffle = () => {
        if (isRandomizing) return;
        const original1 = temp1.trim() || "Игрок 1";
        const original2 = temp2.trim() || "Игрок 2";
        setIsRandomizing(true);

        flickerIntervalRef.current = setInterval(() => {
          if (Math.random() > 0.5) {
            setPlayer1Name(original2);
            setPlayer2Name(original1);
          } else {
            setPlayer1Name(original1);
            setPlayer2Name(original2);
          }
        }, 160);

        flickerTimeoutRef.current = setTimeout(() => {
          if (flickerIntervalRef.current) {
            clearInterval(flickerIntervalRef.current);
            flickerIntervalRef.current = null;
          }
          const swap = Math.random() > 0.5;
          setPlayer1Name(swap ? original2 : original1);
          setPlayer2Name(swap ? original1 : original2);
          setPlayer1(TOTAL_SECONDS);
          setPlayer2(TOTAL_SECONDS);
          setActivePlayer(1);
          setRunning(false);
          setIsRandomizing(false);
          flickerTimeoutRef.current = null;
        }, 2400);
      };

      const openJudgesOverlay = () => {
        setJudgeRunning(false);
        setJudgeElapsed(0);
        setJudgeMinutesInput(String(Math.max(1, judgeLimit / 60)));
        setShowJudgesOverlay(true);
      };

      const setJudgePreset = (seconds) => {
        setJudgeLimit(seconds);
        setJudgeElapsed(0);
        setJudgeRunning(false);
        setJudgeMinutesInput(String(seconds / 60));
      };

      const applyJudgeCustom = () => {
        const parsed = Number(String(judgeMinutesInput).replace(",", "."));
        if (!Number.isFinite(parsed) || parsed <= 0) return;
        const seconds = Math.round(parsed * 60);
        setJudgeLimit(seconds);
        setJudgeElapsed(0);
        setJudgeRunning(false);
      };

      return (
        <div className="relative min-h-screen overflow-hidden bg-[#030712] text-white">
          <StarField />

          <div className="relative z-10 mx-auto flex min-h-screen w-full max-w-[var(--content-max)] flex-col px-4 py-3 sm:px-5 md:px-7 md:py-4 xl:px-10">
            <header className="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
              <div className="min-w-0">
                <TerraLogo />
                <div className="mt-3 max-w-3xl hero-tight">
                  <div className="font-semibold tracking-tight" style={{ fontSize: "var(--hero-title-size)", lineHeight: 0.95 }}>
                    ТЕР<span className="text-blue-400">R</span>итория влияния
                  </div>
                  <div className="mt-2 uppercase tracking-[0.22em] text-blue-200/75" style={{ fontSize: "var(--hero-subtitle-size)" }}>
                    Турнир по переговорам · экспресс‑формат
                  </div>
                  <div className="mt-3 text-[10px] sm:text-[11px] uppercase tracking-[0.24em] text-blue-100/50">
                    Уфа · Самара · Тольятти · Челябинск
                  </div>
                </div>
              </div>

              <div className="flex flex-wrap items-center gap-3 self-start">
                <button
                  onClick={() => setSoundEnabled((value) => !value)}
                  className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-4 sm:px-5 py-3 text-sm text-white/85 hover:bg-white/10"
                >
                  <Volume2Icon size={16} />
                  {soundEnabled ? "Звук: кино-режим" : "Звук выкл."}
                </button>
              </div>
            </header>

            <main className="relative flex flex-1 flex-col justify-center py-2 sm:py-3">
              <div className="pointer-events-none absolute left-1/2 top-1/2 hidden h-[28rem] w-[28rem] -translate-x-1/2 -translate-y-1/2 rounded-full bg-[radial-gradient(circle,rgba(255,161,94,0.25),rgba(77,107,255,0.10),transparent_68%)] blur-2xl xl:block" />

              <div className="mb-3 sm:mb-4 flex flex-wrap items-center justify-center gap-3 controls-tight">
                <button onClick={openRandomizer} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-4 sm:px-5 py-3 text-sm text-white/85 hover:bg-white/10">
                  <ShuffleIcon size={16} />
                  Жеребьёвка
                </button>
                <button onClick={openJudgesOverlay} className="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-4 sm:px-5 py-3 text-sm text-white/85 hover:bg-white/10">
                  <MessageSquareIcon size={16} />
                  Комментарий судьи
                </button>
              </div>

              <div className="relative grid grid-cols-1 gap-3 lg:grid-cols-[1fr_auto_1fr] xl:gap-5 items-center">
                <DuelSide
                  title="Игрок 1"
                  player={player1Name}
                  active={activePlayer === 1 && running}
                  timeLeft={player1}
                  totalTime={TOTAL_SECONDS}
                  onToggle={() => togglePlayer(1)}
                />

                <div className="relative hidden lg:flex flex-col items-center justify-center py-0">
                  <div className="h-8" />
                </div>

                <DuelSide
                  title="Игрок 2"
                  player={player2Name}
                  active={activePlayer === 2 && running}
                  timeLeft={player2}
                  totalTime={TOTAL_SECONDS}
                  onToggle={() => togglePlayer(2)}
                />
              </div>

              <div className="mt-1 flex justify-center">
                <button
                  onClick={reset}
                  className="inline-flex items-center gap-2 rounded-2xl border border-orange-300/30 bg-orange-400/10 px-5 sm:px-6 py-3 text-sm text-orange-100 hover:bg-orange-400/20"
                >Сброс</button>
              </div>
            </main>
          </div>

          {showFlashEffect && (
            <motion.div
              initial={{ opacity: 0 }}
              animate={{ opacity: [0, 1, 0] }}
              transition={{ duration: 0.3, times: [0, 0.35, 1] }}
              className="pointer-events-none fixed inset-0 z-[45] bg-[radial-gradient(circle,rgba(255,255,255,0.95),rgba(145,196,255,0.78),rgba(255,170,110,0.35),rgba(0,0,0,0))]"
            />
          )}

          {showEndEffect && (
            <motion.div
              initial={{ opacity: 0 }}
              animate={{ opacity: [0, 1, 1, 0] }}
              transition={{ duration: 2.6, times: [0, 0.12, 0.78, 1] }}
              className="pointer-events-none fixed inset-0 z-40 flex items-center justify-center bg-[radial-gradient(circle,rgba(255,143,90,0.22),rgba(59,92,255,0.16),rgba(0,0,0,0.82))] backdrop-blur-sm"
            >
              <motion.div
                initial={{ scale: 0.92, opacity: 0 }}
                animate={{ scale: [0.92, 1.05, 1], opacity: [0, 1, 1, 0] }}
                transition={{ duration: 2.3, times: [0, 0.18, 0.78, 1] }}
                className="rounded-[2rem] border border-orange-300/35 bg-white/10 px-8 sm:px-10 py-7 sm:py-8 text-center shadow-[0_0_120px_rgba(255,145,74,0.26)]"
              >
                <div className="text-sm uppercase tracking-[0.55em] text-orange-100/75">финальный гонг</div>
                <div className="mt-4 text-3xl sm:text-4xl md:text-6xl font-semibold tracking-[0.12em] text-white">КОНЕЦ РАУНДА</div>
                <div className="mt-4 text-sm sm:text-base uppercase tracking-[0.35em] text-blue-100/70">время вышло</div>
              </motion.div>
            </motion.div>
          )}

          <RandomOverlay
            open={showRandomizer}
            temp1={temp1}
            temp2={temp2}
            current1={player1Name}
            current2={player2Name}
            onTemp1={setTemp1}
            onTemp2={setTemp2}
            onShuffle={startShuffle}
            isRandomizing={isRandomizing}
            onStartGame={startGame}
          />

          <JudgesOverlay
            open={showJudgesOverlay}
            judgeElapsed={judgeElapsed}
            judgeLimit={judgeLimit}
            judgeRunning={judgeRunning}
            judgeMinutesInput={judgeMinutesInput}
            onClose={() => { setJudgeRunning(false); setShowJudgesOverlay(false); }}
            onStartPause={() => setJudgeRunning((prev) => !prev)}
            onSetPreset={setJudgePreset}
            onJudgeMinutesInputChange={setJudgeMinutesInput}
            onApplyCustom={applyJudgeCustom}
            onNextJudge={() => { setJudgeElapsed(0); setJudgeRunning(true); }}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
